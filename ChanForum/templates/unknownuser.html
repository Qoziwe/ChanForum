{% extends 'base.html' %}

{% block title %} Profile {% endblock %}
{% if profile_image %}
  <img
    src="{% if profile_image %}{{ url_for('static', filename=profile_image) }}{% else %}{{ url_for('static', filename='images/DefaultProfileImage.jpg') }}{% endif %}"
    alt="Profile Image"
    style="width: 150px; height: 150px; border-radius: 50%;"
  />
{% else %}
  <img
    src="{{ url_for('static', filename='images/default-profile.png') }}"
    alt="Default Profile Image"
    style="width: 150px; height: 150px; border-radius: 50%;"
  />
{% endif %}

{% block body %}
  <section id="ProfileBanner">
      <img
          src="{% if author_image %}{{ url_for('static', filename=author_image) }}{% else %}{{ url_for('static', filename='images/DefaultProfileImage.jpg') }}{% endif %}"
          alt="Profile Image"
          style="width: 150px; height: 150px; border-radius: 50%;"/>

      <div class="nicknameh1"><h1>{{ author_username }}</h1></div>
      {% if is_friend %}
          <h2>You are already friends.</h2>
      {% else %}
          <form method="POST">
              <button type="submit">Add Friend</button>
          </form>
      {% endif %}

      <h2><a href="/">Posts</a></h2>
  </section>
{% endblock %}
